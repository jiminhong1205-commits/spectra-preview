<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SPECTRA — 기업 커뮤니케이션 인프라의 새로운 기준</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          spectra: '#1A6BFF',
          dworks:  '#00C6FF',
          noa:     '#5B21B6',
        },
        fontFamily: {
          pretendard: ['Pretendard', '-apple-system', 'BlinkMacSystemFont', 'sans-serif'],
        },
      }
    }
  }
</script>
<style>
  @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css');

  /* ── Reset & Base ── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; -webkit-font-smoothing: antialiased; }
  body {
    font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    color: #0F172A;
    background: #fff;
    overflow-x: hidden;
    line-height: 1.75;
  }
  /* ── Force Pretendard on all elements including numbers & English ── */
  *, input, textarea, select, button {
    font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }

  /* ── Token System ── */
  :root {
    --spectra: #1A6BFF;
    --dworks:  #00C6FF;
    --noa:     #5B21B6;
    --noa-acc: #7C3AED;
    --text1:   #0F172A;
    --text2:   #475569;
    --text3:   #94A3B8;
    --bg0:     #FFFFFF;
    --bg1:     #F8FAFC;
    --bg2:     #F1F5F9;
    --bdr:     rgba(0,0,0,.07);
    --bdrmd:   rgba(0,0,0,.12);
    --dk:      #060A14;
    --r:       16px;
    --rsm:     10px;
  }

  /* ── Utility ── */
  .container { max-width: 1200px; margin: 0 auto; padding: 0 28px; }
  a { text-decoration: none; color: inherit; }

  /* ── NOTICE BAR ── */
  .notice-bar {
    background: linear-gradient(90deg, var(--spectra), var(--noa));
    padding: 9px 24px;
    text-align: center;
    font-size: 13px; font-weight: 600; color: #fff;
    letter-spacing: 0.01em;
  }
  .notice-bar a { color: #fff; opacity: .9; }
  .notice-bar a:hover { opacity: 1; text-decoration: underline; }

  /* ── HERO — Video Stage ── */
  .hero {
    background: #fff;
    padding: 80px 0 60px;
    position: relative; overflow: hidden;
  }
  .hero::before {
    content: '';
    position: absolute; inset: 0; pointer-events: none;
    background:
      radial-gradient(ellipse 70% 60% at 50% 10%, rgba(26,107,255,.04) 0%, transparent 70%);
  }
  .hero-video-frame {
    position: relative;
    border-radius: 20px;
    overflow: hidden;
    background: var(--bg1);
    border: 1px solid var(--bdrmd);
    box-shadow: 0 32px 80px rgba(0,0,0,.1), 0 4px 16px rgba(0,0,0,.06);
    aspect-ratio: 16/9;
    display: flex; align-items: center; justify-content: center;
    width: 100%;
  }
  .hero-video-placeholder {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 14px; color: var(--text3); font-size: 14px; font-weight: 500;
    width: 100%; height: 100%; padding: 40px;
    position: relative; z-index: 2;
  }
  .hero-play-icon {
    width: 72px; height: 72px; border-radius: 50%;
    background: var(--spectra);
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 8px 28px rgba(26,107,255,.4);
    transition: transform .2s;
  }
  .hero-video-frame:hover .hero-play-icon { transform: scale(1.08); }

  /* ── LOGO STRIP ── */
  .logo-strip {
    background: var(--bg1);
    border-top: 1px solid var(--bdr); border-bottom: 1px solid var(--bdr);
    padding: 36px 0; overflow: hidden;
  }
  .logo-strip-label {
    text-align: center; font-size: 11px; font-weight: 700;
    letter-spacing: .1em; text-transform: uppercase;
    color: var(--text3); margin-bottom: 24px;
  }
  .logo-scroll {
    display: flex; align-items: center; gap: 60px;
    animation: scroll-logos 34s linear infinite;
    width: max-content;
  }
  .logo-item {
    font-size: 14px; font-weight: 700; color: var(--text3);
    white-space: nowrap; letter-spacing: .03em;
  }
  @keyframes scroll-logos {
    0%   { transform: translateX(0); }
    100% { transform: translateX(-50%); }
  }

  /* ── COMMON SECTION ── */
  .section { padding: 120px 0; }
  .section-header { text-align: center; margin-bottom: 72px; }
  .section-eyebrow { margin-bottom: 16px; }
  .pill {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 11.5px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase;
    padding: 5px 14px; border-radius: 100px;
  }
  .pill-spectra { background: rgba(26,107,255,.08); color: var(--spectra); border: 1px solid rgba(26,107,255,.18); }
  .pill-dworks  { background: rgba(0,198,255,.08);  color: #0077AA;        border: 1px solid rgba(0,198,255,.22); }
  .pill-noa     { background: rgba(91,33,182,.08);  color: var(--noa);     border: 1px solid rgba(91,33,182,.2);  }
  .pill-industry{ background: #EFF6FF; color: #1D4ED8; border: 1px solid #BFDBFE; }

  .section-h2 {
    font-size: clamp(28px, 3.4vw, 44px);
    font-weight: 800; letter-spacing: -0.02em;
    line-height: 1.15; margin-bottom: 18px;
    color: var(--text1);
  }
  .section-h2.white { color: #fff; }
  .section-sub {
    font-size: 17px; line-height: 1.8; color: var(--text2);
    max-width: 540px; margin: 0 auto;
  }
  .section-sub.white { color: rgba(255,255,255,.65); }

  /* ── BRAND SECTION ── */
  .section-brand { background: #fff; }
  .brand-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  .brand-card {
    border-radius: 20px; padding: 44px;
    position: relative; overflow: hidden;
    transition: transform .2s, box-shadow .2s;
    display: block;
  }
  .brand-card:hover { transform: translateY(-4px); box-shadow: 0 24px 48px rgba(0,0,0,.1); }
  .brand-card-dworks {
    background: linear-gradient(135deg, #EBF8FF 0%, #F0FBFF 100%);
    border: 1px solid rgba(0,198,255,.2);
  }
  .brand-card-dworks::before {
    content: ''; position: absolute; top: 0; right: 0;
    width: 300px; height: 300px;
    background: radial-gradient(circle, rgba(0,198,255,.12) 0%, transparent 70%);
    pointer-events: none;
  }
  .brand-card-noa {
    background: linear-gradient(135deg, #F5F3FF 0%, #EDE9FE 100%);
    border: 1px solid rgba(91,33,182,.18);
  }
  .brand-card-noa::before {
    content: ''; position: absolute; top: 0; right: 0;
    width: 300px; height: 300px;
    background: radial-gradient(circle, rgba(91,33,182,.1) 0%, transparent 70%);
    pointer-events: none;
  }
  .brand-card-enomix {
    grid-column: span 2;
    background: var(--bg1); border: 1px solid var(--bdr);
    display: flex; align-items: center; gap: 44px;
    padding: 28px 44px; opacity: .7;
  }
  .bc-brand  { font-size: 11px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; margin-bottom: 10px; }
  .bc-product { font-size: 32px; font-weight: 800; letter-spacing: -0.03em; margin-bottom: 14px; color: var(--text1); line-height: 1; }
  .bc-desc { font-size: 14.5px; line-height: 1.7; color: var(--text2); margin-bottom: 30px; }
  .bc-tags { display: flex; gap: 8px; flex-wrap: wrap; }
  .bc-tag {
    font-size: 12px; font-weight: 600;
    padding: 5px 12px; border-radius: 100px;
    background: rgba(0,0,0,.05); color: var(--text2);
    border: 1px solid var(--bdr);
  }
  .bc-arrow {
    position: absolute; bottom: 36px; right: 36px;
    width: 40px; height: 40px; border-radius: 50%;
    background: rgba(0,0,0,.06);
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; transition: background .2s;
  }
  .brand-card:hover .bc-arrow { background: rgba(0,0,0,.11); }

  /* ── CASES ── */
  .section-cases { background: var(--bg1); }
  .cases-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
  .case-card {
    background: #fff; border-radius: 16px; padding: 32px;
    border: 1px solid var(--bdr);
    transition: box-shadow .2s;
  }
  .case-card:hover { box-shadow: 0 12px 36px rgba(0,0,0,.07); }
  .case-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; }
  .case-company { font-size: 16px; font-weight: 800; color: var(--text1); }
  .case-industry { font-size: 11px; font-weight: 700; letter-spacing: .07em; text-transform: uppercase; color: var(--text3); }
  .case-quote { font-size: 14px; line-height: 1.75; color: var(--text2); margin-bottom: 24px; font-style: italic; }
  .case-kpi { display: flex; gap: 24px; margin-bottom: 20px; }
  .case-kpi-num { font-size: 26px; font-weight: 800; letter-spacing: -0.03em; line-height: 1; }
  .case-kpi-num.cy { color: #0077AA; }
  .case-kpi-num.pu { color: var(--noa); }
  .case-kpi-label { font-size: 11px; color: var(--text3); margin-top: 4px; }
  .case-brand-tag { font-size: 11.5px; font-weight: 700; padding: 4px 12px; border-radius: 100px; }

  /* ── TRUST STRIP ── */
  .trust-strip {
    background: #fff; border-top: 1px solid var(--bdr); border-bottom: 1px solid var(--bdr);
    padding: 32px 0;
  }
  .trust-inner {
    display: flex; align-items: center; justify-content: center;
    gap: 44px; flex-wrap: wrap;
  }
  .trust-item { display: flex; align-items: center; gap: 14px; }
  .trust-icon {
    width: 52px; height: 52px; border-radius: 12px; background: var(--bg1);
    border: 1.5px solid var(--bdrmd);
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
  }
  .trust-icon.hi { border-color: #1A6BFF; box-shadow: 0 2px 12px rgba(26,107,255,.12); }
  .trust-title { font-size: 14px; font-weight: 700; color: var(--text1); }
  .trust-sub { font-size: 12px; color: var(--text3); margin-top: 2px; }
  .trust-div { width: 1px; height: 44px; background: var(--bdr); }

  /* ── PRODUCT SECTIONS ── */
  .section-cowork { background: #fff; }
  .section-noa    { background: var(--bg1); }

  .product-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 88px; align-items: center; }
  .product-label {
    display: flex; align-items: center; gap: 8px;
    font-size: 11px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase;
    margin-bottom: 22px;
  }
  .product-h2 {
    font-size: clamp(28px, 2.9vw, 40px);
    font-weight: 800; letter-spacing: -0.02em;
    line-height: 1.15; margin-bottom: 18px;
    color: var(--text1);
  }
  .product-sub { font-size: 16px; line-height: 1.85; color: var(--text2); margin-bottom: 38px; }

  .feature-list { display: flex; flex-direction: column; gap: 12px; margin-bottom: 40px; }
  .feature-item {
    display: flex; align-items: flex-start; gap: 14px;
    padding: 16px 20px; border-radius: 12px;
    background: var(--bg1); border: 1px solid var(--bdr);
    transition: border-color .2s, box-shadow .2s;
  }
  .feature-item:hover { border-color: var(--bdrmd); box-shadow: 0 4px 16px rgba(0,0,0,.06); }
  .feature-icon {
    width: 38px; height: 38px; border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 17px; flex-shrink: 0;
  }
  .fi-dw { background: rgba(0,198,255,.1); }
  .fi-noa { background: rgba(91,33,182,.08); }
  .feature-title { font-size: 14.5px; font-weight: 700; color: var(--text1); margin-bottom: 3px; line-height: 1.4; }
  .feature-desc  { font-size: 13px; color: var(--text2); line-height: 1.6; }

  /* Mockup window */
  .mock-win { border-radius: 16px; overflow: hidden; border: 1px solid var(--bdrmd); box-shadow: 0 24px 64px rgba(0,0,0,.1); }
  .mock-bar { padding: 13px 16px; display: flex; align-items: center; gap: 6px; }
  .mock-bar.dw { background: #EBF8FF; border-bottom: 1px solid rgba(0,198,255,.2); }
  .mock-bar.no { background: #EDE9FE; border-bottom: 1px solid rgba(91,33,182,.2); }
  .mock-dot { width: 10px; height: 10px; border-radius: 50%; }
  .mock-body { padding: 24px; }
  .mock-body.dw { background: #F0FBFF; }
  .mock-body.no { background: #F5F3FF; }
  .chat-mock { display: flex; flex-direction: column; gap: 12px; }
  .chat-msg  { display: flex; gap: 10px; align-items: flex-start; }
  .chat-msg.r { flex-direction: row-reverse; }
  .chat-av {
    width: 32px; height: 32px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 700; flex-shrink: 0;
  }
  .chat-bubble {
    padding: 10px 14px; border-radius: 12px;
    font-size: 12.5px; line-height: 1.55; max-width: 200px;
  }
  .bubble-in  { background: #fff; border: 1px solid var(--bdr); color: var(--text1); }
  .bubble-out { background: var(--spectra); color: #fff; border-radius: 12px 12px 2px 12px; }
  .chat-ts { font-size: 10px; color: var(--text3); margin-top: 3px; }
  .ai-badge {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 6px 12px; border-radius: 8px;
    background: rgba(91,33,182,.08); border: 1px solid rgba(91,33,182,.15);
    font-size: 12px; font-weight: 700; color: var(--noa); margin-top: 8px;
  }
  .ai-insight-card {
    padding: 12px 14px; border-radius: 10px;
    background: #fff; border: 1px solid rgba(91,33,182,.15); margin-bottom: 8px;
  }
  .aic-label { font-size: 10px; font-weight: 700; color: var(--noa); letter-spacing: .06em; text-transform: uppercase; margin-bottom: 5px; }
  .aic-text { font-size: 12px; color: var(--text2); line-height: 1.5; }
  .aic-bar { height: 4px; background: var(--bg2); border-radius: 2px; margin-top: 8px; overflow: hidden; }
  .aic-bar-fill { height: 100%; border-radius: 2px; background: var(--noa); }
  .ai-row { display: flex; gap: 8px; }
  .ai-mini-card { flex: 1; padding: 10px 12px; border-radius: 8px; background: #fff; border: 1px solid var(--bdr); }
  .amc-num { font-size: 17px; font-weight: 800; color: var(--noa); }
  .amc-label { font-size: 10px; color: var(--text3); margin-top: 1px; }

  /* ── SYNERGY ── */
  .section-synergy { background: #EEF2FF; padding: 120px 0; }
  .synergy-grid {
    display: grid; grid-template-columns: 1fr auto 1fr; gap: 28px;
    align-items: center; margin-bottom: 28px;
  }
  .synergy-card { background: #fff; border-radius: 20px; padding: 36px; border: 1px solid var(--bdr); }
  .syn-brand { font-size: 11px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; margin-bottom: 10px; }
  .syn-product { font-size: 22px; font-weight: 800; letter-spacing: -0.03em; margin-bottom: 12px; }
  .syn-desc { font-size: 14px; line-height: 1.7; color: var(--text2); }
  .synergy-plus { text-align: center; padding: 0 12px; }
  .syn-plus-icon { font-size: 28px; font-weight: 800; color: var(--spectra); line-height: 1; }
  .syn-plus-label { font-size: 11px; color: var(--text3); margin-top: 4px; font-weight: 600; }
  .synergy-result {
    text-align: center; padding: 28px;
    background: #fff; border-radius: 16px; border: 1.5px solid var(--spectra);
  }
  .syn-result-label { font-size: 11px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: var(--spectra); margin-bottom: 10px; }
  .syn-result-text { font-size: 20px; font-weight: 800; color: var(--text1); letter-spacing: -0.02em; }

  /* ── INDUSTRY ── */
  .section-industry { background: var(--bg1); }
  .industry-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 16px; }
  .industry-card {
    background: #fff; border-radius: 16px; padding: 28px 20px;
    border: 1px solid var(--bdr);
    transition: transform .2s, box-shadow .2s;
  }
  .industry-card:hover { transform: translateY(-3px); box-shadow: 0 12px 32px rgba(0,0,0,.07); }
  .industry-icon { font-size: 28px; margin-bottom: 14px; }
  .industry-name { font-size: 15px; font-weight: 800; color: var(--text1); margin-bottom: 10px; }
  .industry-desc { font-size: 12.5px; line-height: 1.65; color: var(--text2); margin-bottom: 14px; }
  .industry-clients { font-size: 11.5px; color: var(--text3); line-height: 1.5; }

  /* ── INSIGHTS ── */
  .section-insight { background: #fff; }
  .insights-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
  .insight-card {
    border-radius: 16px; overflow: hidden;
    border: 1px solid var(--bdr);
    transition: box-shadow .2s;
  }
  .insight-card:hover { box-shadow: 0 12px 32px rgba(0,0,0,.07); }
  .insight-thumb {
    height: 140px; display: flex; align-items: center; justify-content: center;
    font-size: 40px;
  }
  .it-finance { background: linear-gradient(135deg, #EFF6FF, #DBEAFE); }
  .it-ai      { background: linear-gradient(135deg, #F5F3FF, #EDE9FE); }
  .it-kakao   { background: linear-gradient(135deg, #ECFDF5, #D1FAE5); }
  .insight-body { padding: 24px; }
  .insight-cat  { font-size: 11.5px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase; margin-bottom: 8px; }
  .insight-title { font-size: 15px; font-weight: 700; color: var(--text1); line-height: 1.55; margin-bottom: 12px; }
  .insight-date  { font-size: 12px; color: var(--text3); }

  /* ── CTA ── */
  .section-cta { background: var(--dk); padding: 160px 0; }
  .cta-inner { text-align: center; }
  .cta-h2 { font-size: clamp(32px, 4vw, 54px); font-weight: 800; line-height: 1.2; letter-spacing: -0.035em; color: #fff; margin-bottom: 20px; }
  .cta-sub { font-size: 17px; line-height: 1.8; color: rgba(255,255,255,.6); max-width: 480px; margin: 0 auto 44px; }
  .cta-btns { display: flex; align-items: center; justify-content: center; gap: 14px; margin-bottom: 24px; flex-wrap: wrap; }
  .cta-note { font-size: 13px; color: rgba(255,255,255,.35); }

  /* ── BUTTONS ── */
  .btn {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 14px 28px; border-radius: 100px;
    font-size: 15px; font-weight: 700; cursor: pointer;
    transition: all .2s; border: none;
  }
  .btn-primary { background: var(--spectra); color: #fff; box-shadow: 0 4px 20px rgba(26,107,255,.35); }
  .btn-primary:hover { background: #1258DD; transform: translateY(-1px); box-shadow: 0 8px 28px rgba(26,107,255,.45); }
  .btn-outline-light { background: transparent; color: var(--text1); border: 1.5px solid var(--bdrmd); }
  .btn-outline-light:hover { background: var(--bg1); }
  .btn-outline-dark { background: transparent; color: #fff; border: 1.5px solid rgba(255,255,255,.2); }
  .btn-outline-dark:hover { background: rgba(255,255,255,.08); }
  .btn-dworks { background: var(--dworks); color: #0A1A2E; box-shadow: 0 4px 20px rgba(0,198,255,.3); }
  .btn-dworks:hover { background: #00B8EF; transform: translateY(-1px); }
  .btn-noa { background: var(--noa); color: #fff; box-shadow: 0 4px 20px rgba(91,33,182,.3); }
  .btn-noa:hover { background: #4B1A9B; transform: translateY(-1px); }

  /* ── FOOTER ── */
  footer { background: #040710; color: rgba(255,255,255,.55); }
  .footer-top { display: grid; grid-template-columns: 240px 1fr; gap: 64px; padding: 72px 0 48px; }
  .footer-logo { font-size: 20px; font-weight: 800; color: #fff; display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
  .footer-logo img { height: 26px; filter: brightness(0) invert(1); }
  .footer-tagline { font-size: 13px; line-height: 1.7; color: rgba(255,255,255,.35); }
  .footer-nav-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 32px; }
  .footer-col-title { font-size: 11px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: rgba(255,255,255,.4); margin-bottom: 16px; }
  .footer-link {
    display: block; font-size: 13.5px; color: rgba(255,255,255,.5);
    margin-bottom: 10px; transition: color .15s;
  }
  .footer-link:hover { color: #fff; }
  .footer-link.legacy { color: rgba(255,255,255,.25); font-size: 12px; }
  .footer-bottom {
    border-top: 1px solid rgba(255,255,255,.06);
    padding: 24px 0;
    display: flex; align-items: center; justify-content: space-between;
    font-size: 12.5px;
  }
  .footer-legal { display: flex; gap: 20px; }
  .footer-legal a { color: rgba(255,255,255,.3); transition: color .15s; }
  .footer-legal a:hover { color: rgba(255,255,255,.6); }

  /* ── STICKY CTA BAR ── */
  .sticky-bar {
    position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
    z-index: 80;
    background: rgba(6,10,20,.9); backdrop-filter: blur(16px);
    border: 1px solid rgba(255,255,255,.1);
    border-radius: 100px; padding: 10px 10px 10px 24px;
    display: flex; align-items: center; gap: 16px;
    box-shadow: 0 12px 36px rgba(0,0,0,.4);
    white-space: nowrap;
  }
  .sticky-bar-text { font-size: 14px; font-weight: 600; color: rgba(255,255,255,.75); }

  /* ── RESPONSIVE ── */
  @media (max-width: 960px) {
    .hero-inner { grid-template-columns: 1fr; gap: 48px; }
    .product-layout { grid-template-columns: 1fr; gap: 48px; }
    .brand-grid { grid-template-columns: 1fr; }
    .brand-card-enomix { grid-column: span 1; flex-direction: column; align-items: flex-start; }
    .cases-grid { grid-template-columns: 1fr; }
    .industry-grid { grid-template-columns: repeat(2, 1fr); }
    .insights-grid { grid-template-columns: 1fr; }
    .footer-top { grid-template-columns: 1fr; }
    .footer-nav-grid { grid-template-columns: repeat(2, 1fr); }
    .synergy-grid { grid-template-columns: 1fr; }
    .hero-stats { flex-wrap: wrap; gap: 28px; }
  }

  /* ── GNB ── */
  .gnb { position:sticky; top:0; z-index:100; background:#ffffff; border-bottom:1px solid rgba(0,0,0,.07); padding:0 28px; }
  .gnb-inner { max-width:1200px; margin:0 auto; display:flex; align-items:center; height:68px; gap:4px; }
  .gnb-logo-wrap { display:flex; align-items:center; gap:20px; margin-right:44px; flex-shrink:0; }
  .gnb-logo img { height:32px; display:block; }
  .gnb-blog { font-size:15px; font-weight:500; color:#374151; transition:color .15s; text-decoration:none; }
  .gnb-blog:hover { color:#1A6BFF; }
  .gnb-nav { display:flex; align-items:center; gap:2px; flex:1; }
  .gnb-item {
    position:relative; padding:8px 14px; font-size:15px; font-weight:500;
    color:#475569; cursor:pointer; border-radius:8px;
    transition:all .15s; white-space:nowrap; text-decoration:none;
    display:inline-block;
  }
  .gnb-item:hover { color:#0F172A; background:#F8FAFC; }
  .gnb-item.has-dd::after {
    content:''; display:inline-block; width:5px; height:5px;
    margin-left:6px; vertical-align:2px;
    border-right:1.5px solid currentColor; border-bottom:1.5px solid currentColor;
    transform:rotate(45deg) translateY(-2px);
  }
  /* 투명 브리지: 메뉴와 드롭다운 사이 gap hover 끊김 방지 */
  .gnb-item.has-dd { padding-bottom:8px; }
  .gnb-dd {
    display:none; position:absolute; top:calc(100%); left:0;
    padding-top:4px; min-width:220px; z-index:200;
  }
  .gnb-dd-inner {
    background:#fff; border:1px solid rgba(0,0,0,.07);
    border-radius:14px; padding:8px;
    box-shadow:0 16px 48px rgba(0,0,0,.1);
  }
  .gnb-item:hover .gnb-dd,
  .gnb-item.open .gnb-dd { display:block; }
  .gnb-dd-sec { font-size:10px; font-weight:700; color:#94A3B8; letter-spacing:.08em; text-transform:uppercase; padding:6px 10px 3px; }
  .gnb-dd-div { height:1px; background:rgba(0,0,0,.07); margin:6px 8px; }
  .gnb-dd-item {
    display:flex; align-items:center; gap:10px; padding:9px 12px;
    border-radius:8px; font-size:13.5px; font-weight:500; color:#475569;
    cursor:pointer; transition:background .15s; text-decoration:none;
  }
  .gnb-dd-item:hover { background:#F8FAFC; color:#0F172A; }
  .gnb-dd-dot { width:7px; height:7px; border-radius:50%; flex-shrink:0; }
  .gnb-cta { padding:10px 22px; border-radius:100px; background:#1A6BFF; color:#fff; font-size:13.5px; font-weight:700; transition:all .2s; white-space:nowrap; text-decoration:none; }
  .gnb-cta:hover { background:#1258DD; box-shadow:0 4px 16px rgba(26,107,255,.35); }

</style>
</head>
<body>

<!-- ═══ 도입 문의 팝업 모달 ═══ -->
<div id="inquiryModal" style="display:none;position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,0.55);align-items:center;justify-content:center;">
  <div id="modalBox" style="background:#fff;border-radius:20px;width:100%;max-width:560px;max-height:90vh;overflow-y:auto;position:relative;padding:44px 40px;margin:20px;box-shadow:0 32px 80px rgba(0,0,0,0.25);">
    <button onclick="closeInquiry()" style="position:absolute;top:18px;right:18px;background:none;border:none;cursor:pointer;width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;" onmouseover="this.style.background='#F1F5F9'" onmouseout="this.style.background='none'">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#475569" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
    <div id="modalContent">
      <h2 style="font-size:22px;font-weight:800;color:#0F172A;margin-bottom:6px;letter-spacing:-0.02em;">제품 도입 문의</h2>
      <p style="font-size:13.5px;color:#64748B;margin-bottom:28px;line-height:1.6;">간단한 정보를 입력하면 영업 담당자가 신속하게 상담해 드립니다.</p>
      <form id="inquiryForm" style="display:flex;flex-direction:column;gap:16px;">
        <div>
          <label style="display:block;font-size:13px;font-weight:700;color:#374151;margin-bottom:5px;">이름 <span style="color:#EF4444;">*</span></label>
          <input id="iName" type="text" placeholder="홍길동" required style="width:100%;padding:11px 14px;border:1.5px solid #E2E8F0;border-radius:10px;font-size:14px;outline:none;font-family:inherit;box-sizing:border-box;" onfocus="this.style.borderColor='#1A6BFF'" onblur="this.style.borderColor='#E2E8F0'">
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
          <div>
            <label style="display:block;font-size:13px;font-weight:700;color:#374151;margin-bottom:5px;">회사명 <span style="color:#EF4444;">*</span></label>
            <input id="iCompany" type="text" placeholder="스펙트라" required style="width:100%;padding:11px 14px;border:1.5px solid #E2E8F0;border-radius:10px;font-size:14px;outline:none;font-family:inherit;box-sizing:border-box;" onfocus="this.style.borderColor='#1A6BFF'" onblur="this.style.borderColor='#E2E8F0'">
          </div>
          <div>
            <label style="display:block;font-size:13px;font-weight:700;color:#374151;margin-bottom:5px;">사업자등록번호</label>
            <input id="iBiz" type="text" placeholder="000-00-00000" style="width:100%;padding:11px 14px;border:1.5px solid #E2E8F0;border-radius:10px;font-size:14px;outline:none;font-family:inherit;box-sizing:border-box;" onfocus="this.style.borderColor='#1A6BFF'" onblur="this.style.borderColor='#E2E8F0'">
          </div>
        </div>
        <div>
          <label style="display:block;font-size:13px;font-weight:700;color:#374151;margin-bottom:5px;">회사 URL</label>
          <input id="iUrl" type="text" placeholder="https://www.spectra.co.kr" style="width:100%;padding:11px 14px;border:1.5px solid #E2E8F0;border-radius:10px;font-size:14px;outline:none;font-family:inherit;box-sizing:border-box;" onfocus="this.style.borderColor='#1A6BFF'" onblur="this.style.borderColor='#E2E8F0'">
        </div>
        <div>
          <label style="display:block;font-size:13px;font-weight:700;color:#374151;margin-bottom:5px;">이메일 <span style="color:#EF4444;">*</span></label>
          <input id="iEmail" type="email" placeholder="info@spectra.co.kr" required style="width:100%;padding:11px 14px;border:1.5px solid #E2E8F0;border-radius:10px;font-size:14px;outline:none;font-family:inherit;box-sizing:border-box;" onfocus="this.style.borderColor='#1A6BFF'" onblur="this.style.borderColor='#E2E8F0'">
        </div>
        <div>
          <label style="display:block;font-size:13px;font-weight:700;color:#374151;margin-bottom:5px;">전화번호 <span style="color:#EF4444;">*</span></label>
          <input id="iTel" type="tel" placeholder="010-1234-5678" required style="width:100%;padding:11px 14px;border:1.5px solid #E2E8F0;border-radius:10px;font-size:14px;outline:none;font-family:inherit;box-sizing:border-box;" onfocus="this.style.borderColor='#1A6BFF'" onblur="this.style.borderColor='#E2E8F0'">
        </div>
        <div>
          <label style="display:block;font-size:13px;font-weight:700;color:#374151;margin-bottom:5px;">문의내용</label>
          <textarea id="iMsg" placeholder="문의내용을 입력해주세요" rows="4" style="width:100%;padding:11px 14px;border:1.5px solid #E2E8F0;border-radius:10px;font-size:14px;outline:none;resize:vertical;font-family:inherit;box-sizing:border-box;" onfocus="this.style.borderColor='#1A6BFF'" onblur="this.style.borderColor='#E2E8F0'"></textarea>
        </div>
        <div style="background:#F8FAFC;border-radius:10px;padding:14px;font-size:12px;color:#475569;line-height:1.7;border:1px solid #E2E8F0;">
          개인정보보호법에 따라 제품문의를 하시는 고객님에게 수집하는 개인정보의 항목, 개인정보의 수집 및 이용목적, 개인정보의 보유 및 이용기간, 동의 거부권 및 동의 거부 시 불이익에 관한 사항을 안내드리오니 자세히 읽은 후 동의하여 주시기 바랍니다.<br><br>
          <span style="color:#94A3B8;">* 회사의 서비스는 원칙적으로 만 14세 미만의 아동에게 서비스를 제공하지 않으며, 만 14세 미만 아동의 개인정보를 수집하지 않습니다.</span>
        </div>
        <div style="text-align:center;font-size:13.5px;font-weight:600;color:#374151;">
          위와 같이 개인정보를 수집·이용하는데 동의하십니까?
          <div style="display:flex;align-items:center;justify-content:center;gap:24px;margin-top:10px;">
            <label style="display:flex;align-items:center;gap:7px;cursor:pointer;font-weight:500;font-size:14px;">
              <input type="radio" name="iPrivacy" value="agree" style="width:16px;height:16px;accent-color:#1A6BFF;"> 동의
            </label>
            <label style="display:flex;align-items:center;gap:7px;cursor:pointer;font-weight:500;font-size:14px;">
              <input type="radio" name="iPrivacy" value="disagree" style="width:16px;height:16px;accent-color:#1A6BFF;"> 미동의
            </label>
          </div>
        </div>
        <button type="button" onclick="submitInquiry()" style="width:100%;padding:14px;background:#1A6BFF;color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;" onmouseover="this.style.background='#1258DD'" onmouseout="this.style.background='#1A6BFF'">
          문의 제출하기
        </button>
      </form>
    </div>
  </div>
</div>

<script>
function openModal() {
  document.getElementById("inquiryModal").style.display = "flex";
  document.body.style.overflow = "hidden";
}
function closeInquiry() {
  document.getElementById("inquiryModal").style.display = "none";
  document.body.style.overflow = "";
}
function submitInquiry() {
  var name = document.getElementById("iName").value;
  var company = document.getElementById("iCompany").value;
  var email = document.getElementById("iEmail").value;
  var tel = document.getElementById("iTel").value;
  var privacy = document.querySelector("input[name='iPrivacy']:checked");
  if (!name || !company || !email || !tel) {
    alert("필수 항목(이름, 회사명, 이메일, 전화번호)을 입력해주세요.");
    return;
  }
  if (!privacy) {
    alert("개인정보 수집·이용 동의 여부를 선택해주세요.");
    return;
  }
  if (privacy.value === "disagree") {
    alert("개인정보 수집에 동의하셔야 문의를 제출할 수 있습니다.");
    return;
  }
  document.getElementById("modalContent").innerHTML =
    "<div style='text-align:center;padding:48px 0;'>" +
    "<div style='font-size:52px;margin-bottom:16px;'>&#x2705;</div>" +
    "<div style='font-size:20px;font-weight:800;color:#0F172A;margin-bottom:10px;'>문의가 접수되었습니다.</div>" +
    "<div style='font-size:14px;color:#64748B;line-height:1.8;'>영업일 기준 24시간 내에<br>담당자가 연락드리겠습니다.</div>" +
    "<button onclick='closeInquiry()' style='margin-top:28px;padding:12px 32px;background:#1A6BFF;color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;'>닫기</button>" +
    "</div>";
}
document.getElementById("inquiryModal").addEventListener("click", function(e) {
  if (e.target === this) closeInquiry();
});
document.addEventListener("keydown", function(e) {
  if (e.key === "Escape") closeInquiry();
});
</script>

</body>
</html>
